<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruota della Fortuna - Manche</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://tombola-53e42-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ruotaRef = ref(db, 'ruota_manche');

        let isAdmin = false;
        let coloreSelezionato = 'bg-red-500';
        let numeroMancheAttuale = 1;

        // Password Operatore
        window.sbloccaAdmin = () => {
            const pass = prompt("Codice Operatore:");
            if (pass === "1234") {
                isAdmin = true;
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        };

        // Gestione Tavolozza
        window.selezionaColore = (colore, el) => {
            coloreSelezionato = colore;
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('ring-4', 'ring-white'));
            el.classList.add('ring-4', 'ring-white');
        };

        // Invia Numero
        window.inviaNumero = () => {
            const num = document.getElementById('input-numero').value;
            if(!num) return;

            push(ruotaRef, {
                valore: num,
                colore: coloreSelezionato,
                manche: numeroMancheAttuale,
                tipo: 'numero',
                ts: serverTimestamp()
            });
            document.getElementById('input-numero').value = '';
        };

        // Crea Nuova Manche (Inserisce la riga di separazione)
        window.nuovaManche = () => {
            numeroMancheAttuale++;
            push(ruotaRef, {
                tipo: 'separatore',
                titolo: `Numeri della ${numeroMancheAttuale}° ruota`,
                ts: serverTimestamp()
            });
        };

        // Reset Totale
        window.resetRuota = () => {
            if(confirm("Vuoi cancellare tutto il tabellone?")) {
                remove(ruotaRef);
                numeroMancheAttuale = 1;
            }
        };

        // Ascolto Dati
        onValue(ruotaRef, (snapshot) => {
            const container = document.getElementById('feed-estrazioni');
            container.innerHTML = '';
            const data = snapshot.val();
            
            if (data) {
                // Inseriamo il titolo della 1° ruota se non esiste già
                let html = `<div class="border-b border-slate-700 pb-2 mb-6 text-left">
                                <h3 class="text-orange-500 font-bold uppercase tracking-widest text-sm">Numeri della 1° ruota</h3>
                            </div>
                            <div class="flex flex-wrap gap-3 mb-10">`;

                const entries = Object.values(data);
                entries.forEach((item) => {
                    if (item.tipo === 'separatore') {
                        html += `</div>
                                 <div class="border-b border-slate-700 pb-2 mb-6 mt-10 text-left">
                                    <h3 class="text-orange-500 font-bold uppercase tracking-widest text-sm">${item.titolo}</h3>
                                 </div>
                                 <div class="flex flex-wrap gap-3 mb-10">`;
                    } else {
                        html += `<div class="flex items-center justify-center w-14 h-14 rounded-xl text-2xl font-black text-white shadow-lg shadow-black/40 animate-in zoom-in duration-300 ${item.colore}">
                                    ${item.valore}
                                 </div>`;
                    }
                });
                html += `</div>`;
                container.innerHTML = html;
                window.scrollTo(0, document.body.scrollHeight);
            } else {
                container.innerHTML = '<p class="text-slate-600 italic">In attesa della prima estrazione...</p>';
            }
        });

    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans pb-20">

    <div class="max-w-xl mx-auto p-4">
        <header class="text-center py-8">
            <h1 onclick="sbloccaAdmin()" class="text-5xl font-black text-white uppercase italic tracking-tighter cursor-pointer drop-shadow-2xl">
                RUOTA <span class="text-orange-500 font-black">LIVE</span>
            </h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.4em] mt-2">Oratorio in Festa</p>
        </header>

        <div id="admin-panel" class="hidden mb-10 p-6 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl">
            <p class="text-orange-500 text-[10px] font-black uppercase mb-4 tracking-widest">Configurazione Manche</p>
            
            <div class="flex justify-between mb-6">
                <div onclick="selezionaColore('bg-red-500', this)" class="color-dot w-10 h-10 rounded-full bg-red-500 cursor-pointer ring-4 ring-white"></div>
                <div onclick="selezionaColore('bg-blue-500', this)" class="color-dot w-10 h-10 rounded-full bg-blue-500 cursor-pointer"></div>
                <div onclick="selezionaColore('bg-green-500', this)" class="color-dot w-10 h-10 rounded-full bg-green-500 cursor-pointer"></div>
                <div onclick="selezionaColore('bg-yellow-500', this)" class="color-dot w-10 h-10 rounded-full bg-yellow-500 cursor-pointer"></div>
                <div onclick="selezionaColore('bg-purple-600', this)" class="color-dot w-10 h-10 rounded-full bg-purple-600 cursor-pointer"></div>
                <div onclick="selezionaColore('bg-pink-500', this)" class="color-dot w-10 h-10 rounded-full bg-pink-500 cursor-pointer"></div>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="number" id="input-numero" placeholder="Inserisci Numero" 
                       class="bg-slate-800 p-5 rounded-2xl text-center text-3xl font-black outline-none border-2 border-slate-700 focus:border-orange-500 transition-all">
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="inviaNumero()" class="bg-orange-600 hover:bg-orange-500 p-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">
                        Estrai
                    </button>
                    <button onclick="nuovaManche()" class="bg-slate-700 hover:bg-slate-600 p-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">
                        Nuova Ruota
                    </button>
                </div>
                
                <button onclick="resetRuota()" class="text-red-500 text-[10px] font-bold uppercase mt-2 tracking-widest">
                    ⚠️ Svuota Tutto
                </button>
            </div>
        </div>

        <div id="feed-estrazioni" class="space-y-4">
            </div>
    </div>

</body>
</html>
